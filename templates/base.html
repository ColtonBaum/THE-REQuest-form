<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Tool Request{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Bootstrap 5 (plain — our CSS handles theming) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Our theme -->
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  </head>
  <body>

    <!-- Minimal top bar — brand tucked left -->
    <nav class="navbar navbar-dark mb-0" style="background: var(--navy); padding: 0.5rem 1rem;">
      <a class="navbar-brand" href="{{ url_for('public.make_request') }}"
         style="font-size: 0.95rem; font-weight: 600; letter-spacing: -0.01em;">
        Mountain West Industrial
      </a>
    </nav>

    <main>
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          <div class="container" style="max-width: 640px;">
            {% for cat, msg in messages %}
              <div class="alert alert-{{ cat }} alert-dismissible fade show mt-3" role="alert">
                {{ msg }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
              </div>
            {% endfor %}
          </div>
        {% endif %}
      {% endwith %}

      {% block content %}{% endblock %}
    </main>

    <!-- Bootstrap Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
